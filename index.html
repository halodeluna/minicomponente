<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>⊹₊⟡⋆ Minicomponente ⊹₊⟡⋆</title>

<style>

/* CURSOR GLOBAL */
* {
    cursor: url("https://images.prismic.io/minicomponente/agdCRKYofJOwHR5L_cursorbless.tiff?auto=format,compress"), auto !important;
}

/* BACKGROUND */
body {
    background-color: #f5abff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
}

/* IMAGEN PRINCIPAL */
img {
    width: 1500px;
}

/* CONTENEDOR */
.contenedor {
    position: relative;
}

/* BOTONES */
.boton {
    position: absolute;
    padding: 12px 20px;
    border: none;
    background-color: #f269c2;
    color: white;
    font-family: "Courier New", monospace;
    font-weight: 900;
    font-size: 14px;
    transition: 0.2s;
    z-index: 10;
}

.boton:hover {
    background-color: #f2a2c2;
    transform: scale(1.2);
}

/* GIFS FLOTANTES */
.floaty {
    position: absolute;
    pointer-events: none;
    z-index: 5;

    animation: flotar 6s ease-in-out infinite;
}

/* ANIMACION */
@keyframes flotar {

    0% {
        transform: translate(0px, 0px);
    }

    25% {
        transform: translate(12px, -10px);
    }

    50% {
        transform: translate(-8px, -18px);
    }

    75% {
        transform: translate(-14px, 8px);
    }

    100% {
        transform: translate(0px, 0px);
    }
}

/* POSICIONES */
.btn1 { top: 20%; left: 15%; }
.btn2 { top: 50%; left: 10%; }
.btn3 { top: 75%; left: 70%; }
.btn4 { top: 75%; left: 90%; }
.btn5 { top: 35%; left: 20%; }

/* OVERLAY */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* WINAMP STYLE WINDOW */
.modal-content {
    width: 420px;
    max-height: 80vh;

    background: #c0c0c0;
    border: 3px solid #000;
    box-shadow: 6px 6px 0px #000;

    font-family: "Tahoma", "Arial", sans-serif;
    color: black;

    position: relative;

    display: flex;
    flex-direction: column;
}

/* TITLE BAR */
.winbar {
    background: linear-gradient(to right, #000080, #0000ff);
    color: white;
    padding: 6px 8px;

    font-size: 13px;
    font-weight: bold;

    display: flex;
    justify-content: space-between;
    align-items: center;

    flex-shrink: 0;
}

/* CLOSE ICON */
.close {
    width: 18px;
    height: 18px;
}

/* BODY CONTENT */
.wincontent {
    padding: 12px;
    font-size: 14px;
    background: #c0c0c0;

    overflow-y: auto;
    max-height: 60vh;

    scrollbar-color: #a0a0a0 #c0c0c0;
    scrollbar-width: auto;
}

/* SCROLLBAR WINAMP / WIN98 */
.wincontent::-webkit-scrollbar {
    width: 16px;
}

.wincontent::-webkit-scrollbar-track {
    background: #c0c0c0;
    border-left: 2px solid #808080;
}

.wincontent::-webkit-scrollbar-thumb {
    background: #a0a0a0;
    border: 2px outset #fff;
}

.wincontent::-webkit-scrollbar-thumb:hover {
    background: #8a8a8a;
}

/* LINKS */
.wincontent a {
    color: black;
    text-decoration: underline;
}

.wincontent a:hover {
    color: #0000ff;
}

/* IMAGE INSIDE MODAL */
.wincontent img {
    width: 100%;
    margin-top: 10px;
    border: 2px inset #fff;
}

</style>
</head>

<div class="contenedor">

/* POSICIONES RANDOM GIFS */

const floaters = document.querySelectorAll(".floaty");
